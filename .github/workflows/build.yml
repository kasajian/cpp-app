name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Windows x64 (Clang-cl + static CRT + vcpkg x64-windows-static)
  # -T ClangCL selects the LLVM/clang-cl toolset (pre-installed on the runner)
  # while keeping the MSVC linker and runtime, so /MT and vcpkg static triplet
  # work exactly as they do with plain MSVC.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -T ClangCL
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        run: cmake --build build --config Release --target package
        working-directory: build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: build/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux x64 (Clang, static libgcc/libstdc++)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux x64
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential ninja-build clang llvm \
            curl zip unzip tar pkg-config

      - name: Setup vcpkg
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: cpack --config CPackConfig.cmake -G TGZ
        working-directory: build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: build/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS – Intel x86_64
  # ---------------------------------------------------------------------------
  build-macos-x64:
    name: macOS Intel (x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=x86_64
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: cpack --config CPackConfig.cmake -G TGZ
        working-directory: build

      - name: Rename artifact to include arch
        run: |
          cd build
          for f in *.tar.gz; do
            mv "$f" "${f%.tar.gz}-x86_64.tar.gz"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-x86_64
          path: build/*-x86_64.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS – Apple Silicon (arm64)
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=arm64
          -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: cpack --config CPackConfig.cmake -G TGZ
        working-directory: build

      - name: Rename artifact to include arch
        run: |
          cd build
          for f in *.tar.gz; do
            mv "$f" "${f%.tar.gz}-arm64.tar.gz"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: build/*-arm64.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # WebAssembly / Emscripten (runs in browser; tested via Node.js in CI)
  # ---------------------------------------------------------------------------
  build-emscripten:
    name: WebAssembly (Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Setup vcpkg
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake"
          -DVCPKG_TARGET_TRIPLET=wasm32-emscripten

      - name: Build
        run: cmake --build build --parallel

      - name: Test (via Node.js)
        # Emscripten output runs under Node.js without a browser.
        # -sEXIT_RUNTIME=1 ensures the process exits cleanly after main().
        run: node build/bin/cpp_app.js

      - name: Package
        run: cpack --config CPackConfig.cmake -G TGZ
        working-directory: build

      - name: Rename artifact to include platform
        run: |
          cd build
          for f in *.tar.gz; do
            mv "$f" "${f%.tar.gz}-wasm.tar.gz"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-wasm
          path: build/*-wasm.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android / Termux ARM64 (NDK + vcpkg arm64-android)
  # ---------------------------------------------------------------------------
  build-android:
    name: Android ARM64 (Termux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=arm64-android
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="${ANDROID_NDK_LATEST_HOME}/build/cmake/android.toolchain.cmake"
          -DANDROID_ABI=arm64-v8a
          -DANDROID_PLATFORM=android-24
          -DANDROID_STL=c++_static

      - name: Build
        run: cmake --build build --parallel

      # Tests are skipped for Android: the binary targets Android's Bionic ABI
      # and cannot execute on a standard Linux runner regardless of architecture.
      # Options for real test execution: Android emulator via
      # reactivecircus/android-emulator-runner (slow, x86_64 images only) or
      # a self-hosted runner with a physical device connected via adb.

      - name: Package
        run: cpack --config CPackConfig.cmake -G TGZ
        working-directory: build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android-arm64
          path: build/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Wine – run the Windows x64 release binary under Wine on Linux.
  # Verifies that the statically linked binary remains compatible with Wine's
  # Win32 implementation.  Targeting _WIN32_WINNT=0x0502 helps here: Wine's
  # coverage of XP/Server-2003-era APIs is extremely mature.
  # This job does not produce a release artifact but runs on every push/PR
  # so any regression in Wine compatibility is caught immediately.
  # ---------------------------------------------------------------------------
  test-wine:
    name: Wine compatibility (Windows x64)
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x64
          path: windows-artifact

      - name: Install Wine (64-bit)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wine64

      - name: Extract artifact
        run: unzip windows-artifact/*.zip -d windows-bin

      - name: Run under Wine
        env:
          WINEDEBUG: "-all"       # suppress Wine's verbose debug output
          WINEDLLOVERRIDES: "mscoree,mshtml="   # skip .NET/IE stubs
        run: |
          exe=$(find windows-bin -name "*.exe" | head -1)
          echo "Running: $exe"
          wine64 "$exe"

  # ---------------------------------------------------------------------------
  # Release – only runs when a v*.*.* tag is pushed
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
      - build-macos-x64
      - build-macos-arm64
      - build-android
      - build-emscripten
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: release-assets/*
          generate_release_notes: true
